# vLLM GPU Deployment
# Requires NVIDIA GPU with nvidia-container-toolkit

apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen
  namespace: default
  labels:
    app: vllm-qwen
spec:
  selector:
    app: vllm-qwen
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen
  namespace: default
  labels:
    app: vllm-qwen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-qwen
  template:
    metadata:
      labels:
        app: vllm-qwen
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Allow time for in-flight requests to drain on shutdown.
      # preStop sleep (30s) + worst-case request drain (~55s) + safety buffer ≈ 130s
      terminationGracePeriodSeconds: 130
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install -q huggingface_hub
              hf download Qwen/Qwen3-0.6B --local-dir /models/Qwen3-0.6B
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.9.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          args:
            - --model=/models/Qwen3-0.6B
            - --served-model-name=Qwen/Qwen3-0.6B
            - --host=0.0.0.0
            - --port=8000
            - --dtype=auto
            - --max-model-len=2048
            - --enable-prefix-caching
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          lifecycle:
            preStop:
              sleep:
                seconds: 30
          # startupProbe gates liveness/readiness until model is fully loaded.
          # Max startup time = failureThreshold × periodSeconds = 600s (10 min).
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            failureThreshold: 600
            initialDelaySeconds: 2
            periodSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 1
            failureThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 1
            failureThreshold: 5
            timeoutSeconds: 1
      # Prevent Kubernetes from injecting service env vars that collide with
      # VLLM_PORT (see upstream docs for details).
      enableServiceLinks: false
      volumes:
        - name: model-storage
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
